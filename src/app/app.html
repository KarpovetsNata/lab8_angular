<div class="container">

<h1>{{ title }}</h1>

<input
[(ngModel)]="newTask"
placeholder="Введіть нове завдання"
/>

<button (click)="addTask()">
Додати
</button>

<br><br>

<button (click)="filter='all'">Всі</button>

<button (click)="filter='active'">Активні</button>

<button (click)="filter='completed'">Виконані</button>

<app-task-item

*ngFor="let task of filteredTasks(); let i = index"

[task]="task"

[index]="i"

(deleteTask)="deleteTask($event)"

(toggleTask)="toggleTask($event)"

>

</app-task-item>

</div>
